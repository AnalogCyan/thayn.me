<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Cyan Thayn's personal website showcasing her projects and interests."
      data-i18n-attr="content:home.meta.description"
    />
    <meta
      name="theme-color"
      content="#0b1020"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#eef2ff"
      media="(prefers-color-scheme: light)"
    />
    <meta name="theme-color" content="#46b3ff" />

    <meta property="og:title" content="Cyan Thayn" />
    <meta
      property="og:description"
      content="Cyan Thayn's personal website showcasing her projects and interests."
    />
    <meta property="og:image" content="https://thayn.me/media/profile.svg" />
    <meta property="og:url" content="https://thayn.me/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AnalogCyan" />
    <meta name="twitter:creator" content="@AnalogCyan" />

    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/media/logo.svg" />
    <link rel="apple-touch-icon" href="/media/logo.svg" />
    <!-- EXTERNAL_RESOURCES -->

    <script src="/scripts/i18n-init.js"></script>
    <script src="/scripts/theme-init.js"></script>

    <link rel="stylesheet" href="./styles.css" />
    <script src="./scripts.js" defer></script>

    <title>Cyan Thayn</title>
  </head>
  <body>
    <drop capsule="ambient-background"></drop>
    <div class="h-card">
      <drop capsule="hero-card" data-hero="true" data-nav-page="home"></drop>
    </div>

    <main>
      <section class="glass section-card hero-card" id="top">
        <div class="hero-details">
          <div>
            <div class="name p-name" data-i18n="hero.name">Cyan Thayn</div>
            <div class="subhead p-note" data-i18n="hero.role">
              Programmer · Tinkerer
            </div>
            <a
              class="u-url u-uid"
              href="https://thayn.me/"
              aria-hidden="true"
              tabindex="-1"
            ></a>
          </div>
          <p data-i18n-html="hero.intro">
            Hi, I'm Cyan! Online I go by <strong>AnalogCyan</strong>. I build
            playful tools, fix broken tech, and chase weird ideas across the
            stack.
            <a class="hero-link" href="/about.html">
              Learn more
              <i class="ri-arrow-right-up-line" aria-hidden="true"></i>
            </a>
          </p>
        </div>
        <img
          src="/media/profile.svg"
          width="1080"
          height="1080"
          id="profile"
          alt="Profile Picture"
          data-i18n-attr="alt:hero.alt"
          class="profile-pic u-photo"
        />
      </section>
    </main>

    <drop capsule="site-footer"></drop>
  </body>
</html>
