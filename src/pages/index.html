<!-- thayn.me – index.html – Home page with hero card and profile -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Cyan Thayn's personal website showcasing her projects and interests."
    />
    <meta
      name="theme-color"
      content="#0b1020"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#eef2ff"
      media="(prefers-color-scheme: light)"
    />
    <meta name="theme-color" content="#46b3ff" />

    <meta property="og:title" content="Cyan Thayn" />
    <meta
      property="og:description"
      content="Cyan Thayn's personal website showcasing her projects and interests."
    />
    <meta property="og:image" content="https://thayn.me/media/profile.svg" />
    <meta property="og:url" content="https://thayn.me/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AnalogCyan" />
    <meta name="twitter:creator" content="@AnalogCyan" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/media/logo.svg" />
    <link rel="apple-touch-icon" href="/media/logo.svg" />
    <!-- EXTERNAL_RESOURCES -->

    <script src="/scripts/theme-init.js"></script>

    <link rel="stylesheet" href="./styles.css" />
    <script src="/scripts.js" defer></script>

    <title>Cyan Thayn</title>
  </head>
  <body class="page-shell" data-hero="true" data-nav-page="home">
    <drop capsule="gradient-background" data-animated="true"></drop>
    <div class="container nav-center">
      <drop capsule="header" data-theme-key="thayn_theme">
        <li class="nav-pill__item">
          <a href="/" class="nav-pill__link" aria-label="Home" data-nav="home">
            <i class="ri-home-5-line"></i>
            <span class="nav-pill__text">Home</span>
          </a>
        </li>
        <li class="nav-pill__item">
          <a
            href="/about.html"
            class="nav-pill__link"
            aria-label="About"
            data-nav="about"
          >
            <i class="ri-user-heart-line"></i>
            <span class="nav-pill__text">About</span>
          </a>
        </li>
        <li class="nav-pill__item">
          <a
            href="/blog/"
            class="nav-pill__link"
            aria-label="Blog"
            data-nav="blog"
          >
            <i class="ri-article-line"></i>
            <span class="nav-pill__text">Blog</span>
          </a>
        </li>
        <li class="nav-pill__item">
          <a
            href="/projects.html"
            class="nav-pill__link"
            aria-label="Projects"
            data-nav="projects"
          >
            <i class="ri-folder-3-line"></i>
            <span class="nav-pill__text">Projects</span>
          </a>
        </li>
        <li class="nav-pill__item">
          <a
            href="/photos.html"
            class="nav-pill__link"
            aria-label="Photos"
            data-nav="photos"
          >
            <i class="ri-camera-3-line"></i>
            <span class="nav-pill__text">Photos</span>
          </a>
        </li>
        <li class="nav-pill__item">
          <a
            href="/music.html"
            class="nav-pill__link"
            aria-label="Music"
            data-nav="music"
          >
            <i class="ri-music-2-line"></i>
            <span class="nav-pill__text">Music</span>
          </a>
        </li>
        <li class="nav-pill__item">
          <a
            href="/more.html"
            class="nav-pill__link"
            aria-label="More"
            data-nav="more"
          >
            <i class="ri-more-line" aria-hidden="true"></i>
            <span class="nav-pill__text">More</span>
          </a>
        </li>
      </drop>
    </div>

    <main>
      <div class="h-card">
        <drop capsule="hero-card"></drop>
      </div>

      <drop capsule="buttons">
        <div>

            height="31"

      </drop>
    </main>

    <drop capsule="footer">
      <div class="footer-links">
        <span
          class="footer-link webmention-count"
          role="status"
          aria-label="Webmentions"
          title="Webmentions"
        >
          <i class="ri-chat-3-line" aria-hidden="true"></i>
          <span data-webmention-count data-url="">0</span>
        </span>
        <div class="footer-ring">
          <a
            href="https://fediring.net/previous?host=thayn.me"
            class="footer-link"
            aria-label="Previous site"
            >←</a
          >
          <a href="https://fediring.net/" class="footer-link">Fediring</a>

            href="https://fediring.net/next?host=thayn.me"

      </div>
      <div class="quote-display">Are you ready to embrace uncertainty?</div>
    </drop>

</html>
